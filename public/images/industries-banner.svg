<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="1200" height="160">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="20%" stop-color="#120f00"/>
      <stop offset="50%" stop-color="#1a1400"/>
      <stop offset="80%" stop-color="#120f00"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0"/>
      <stop offset="20%" stop-color="#c9a227" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="1"/>
      <stop offset="80%" stop-color="#c9a227" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f00"/>
      <stop offset="100%" stop-color="#1a1200"/>
    </linearGradient>
    <linearGradient id="activeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3500"/>
      <stop offset="100%" stop-color="#2a1f00"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="160" fill="url(#bannerBg)"/>

  <!-- Top & bottom gold lines -->
  <rect x="0" y="0" width="1200" height="1.5" fill="url(#goldLine)"/>
  <rect x="0" y="158.5" width="1200" height="1.5" fill="url(#goldLine)"/>

  <!-- Industry items: 10 items, each ~120px wide -->
  <!-- 1. Cannabis -->
  <g transform="translate(0,0)">
    <circle cx="60" cy="80" r="32" fill="url(#iconBg)" stroke="#c9a227" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="20" fill="#c9a227" fill-opacity="0.9">🌿</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.5" fill="#c9a227" fill-opacity="0.75">Cannabis</text>
  </g>

  <!-- 2. Luxury -->
  <g transform="translate(120,0)">
    <circle cx="60" cy="80" r="32" fill="url(#iconBg)" stroke="#c9a227" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="20" fill="#c9a227" fill-opacity="0.9">💎</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.5" fill="#c9a227" fill-opacity="0.75">Luxury</text>
  </g>

  <!-- 3. Electronics -->
  <g transform="translate(240,0)">
    <circle cx="60" cy="80" r="32" fill="url(#iconBg)" stroke="#c9a227" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="20" fill="#c9a227" fill-opacity="0.9">💻</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.5" fill="#c9a227" fill-opacity="0.75">Electronics</text>
  </g>

  <!-- 4. Pharma -->
  <g transform="translate(360,0)">
    <circle cx="60" cy="80" r="32" fill="url(#iconBg)" stroke="#c9a227" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="20" fill="#c9a227" fill-opacity="0.9">💊</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.5" fill="#c9a227" fill-opacity="0.75">Pharma</text>
  </g>

  <!-- 5. Fashion (HIGHLIGHTED) -->
  <g transform="translate(480,0)">
    <circle cx="60" cy="80" r="36" fill="url(#activeBg)" stroke="#ffd700" stroke-width="2" filter="url(#glow)"/>
    <text x="60" y="72" text-anchor="middle" font-size="22" fill="#ffd700">👗</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10" font-weight="700" letter-spacing="0.5" fill="#ffd700">Fashion</text>
    <!-- Active dot -->
    <circle cx="60" cy="48" r="3" fill="#ffd700" fill-opacity="0.9"/>
  </g>

  <!-- 6. Automotive -->
  <g transform="translate(600,0)">
    <circle cx="60" cy="80" r="32" fill="url(#iconBg)" stroke="#c9a227" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="20" fill="#c9a227" fill-opacity="0.9">🚗</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.5" fill="#c9a227" fill-opacity="0.75">Automotive</text>
  </g>

  <!-- 7. Food & Wine -->
  <g transform="translate(720,0)">
    <circle cx="60" cy="80" r="32" fill="url(#iconBg)" stroke="#c9a227" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="20" fill="#c9a227" fill-opacity="0.9">🍷</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.5" fill="#c9a227" fill-opacity="0.75">Food &amp; Wine</text>
  </g>

  <!-- 8. Art & NFTs -->
  <g transform="translate(840,0)">
    <circle cx="60" cy="80" r="32" fill="url(#iconBg)" stroke="#c9a227" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="20" fill="#c9a227" fill-opacity="0.9">🎨</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.5" fill="#c9a227" fill-opacity="0.75">Art &amp; NFTs</text>
  </g>

  <!-- 9. Cosmetics -->
  <g transform="translate(960,0)">
    <circle cx="60" cy="80" r="32" fill="url(#iconBg)" stroke="#c9a227" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="20" fill="#c9a227" fill-opacity="0.9">✨</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.5" fill="#c9a227" fill-opacity="0.75">Cosmetics</text>
  </g>

  <!-- 10. Sports -->
  <g transform="translate(1080,0)">
    <circle cx="60" cy="80" r="32" fill="url(#iconBg)" stroke="#c9a227" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="20" fill="#c9a227" fill-opacity="0.9">⚽</text>
    <text x="60" y="124" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.5" fill="#c9a227" fill-opacity="0.75">Sports</text>
  </g>

  <!-- Vertical separators -->
  <line x1="120" y1="30" x2="120" y2="130" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="240" y1="30" x2="240" y2="130" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="360" y1="30" x2="360" y2="130" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="480" y1="30" x2="480" y2="130" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="600" y1="30" x2="600" y2="130" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="720" y1="30" x2="720" y2="130" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="840" y1="30" x2="840" y2="130" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="960" y1="30" x2="960" y2="130" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="1080" y1="30" x2="1080" y2="130" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.25"/>
</svg>
