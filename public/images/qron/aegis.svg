<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="goldGlowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#708090"/>
      <stop offset="100%" stop-color="#9aA0aa"/>
    </linearGradient>
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgRadial)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#c9a227" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
  </g>

  <!-- QR Finder Pattern - Top Left -->
  <g filter="url(#goldGlow)">
    <rect x="30" y="30" width="98" height="98" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="6"/>
    <rect x="46" y="46" width="66" height="66" rx="3" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    <rect x="58" y="58" width="42" height="42" rx="2" fill="url(#goldGrad)"/>
  </g>

  <!-- QR Finder Pattern - Top Right -->
