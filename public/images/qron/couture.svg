      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <radialGradient id="c-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
