<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="greenGlowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="leafShadow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="1" result="offset"/>
      <feMerge>
        <feMergeNode in="offset"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#228b22"/>
    </linearGradient>
    <linearGradient id="limeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#50c878"/>
    </linearGradient>
    <radialGradient id="bgGreen" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#060d06"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgGreen)"/>

  <!-- Organic background texture - faint vein pattern -->
  <g opacity="0.04" stroke="#50c878" stroke-width="1" fill="none">
    <path d="M300,0 Q320,150 300,300 Q280,450 300,600"/>
    <path d="M0,300 Q150,280 300,300 Q450,320 600,300"/>
    <path d="M0,0 Q200,200 300,300 Q400,400 600,600"/>
    <path d="M600,0 Q400,200 300,300 Q200,400 0,600"/>
    <path d="M150,0 Q200,200 300,300"/>
    <path d="M450,0 Q400,200 300,300"/>
    <path d="M0,150 Q200,200 300,300"/>
    <path d="M600,150 Q400,200 300,300"/>
  </g>

  <!-- QR Finder Pattern - Top Left (organic rounded) -->
  <g filter="url(#greenGlow)">
    <rect x="30" y="30" width="98" height="98" rx="14" fill="none" stroke="url(#greenGrad)" stroke-width="6"/>
    <rect x="46" y="46" width="66" height="66" rx="10" fill="none" stroke="url(#greenGrad)" stroke-width="3"/>
    <rect x="58" y="58" width="42" height="42" rx="8" fill="url(#greenGrad)"/>
  </g>

