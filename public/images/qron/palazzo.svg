<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="pbg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#14120e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <linearGradient id="pg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <filter id="pGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="pSoft"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="marble" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#1a1a2e"/>
      <path d="M0,20 Q25,15 50,25 T100,20" fill="none" stroke="#c9a227" stroke-width="0.3" opacity="0.15"/>
      <path d="M0,50 Q30,45 60,55 T100,48" fill="none" stroke="#ffd700" stroke-width="0.3" opacity="0.1"/>
      <path d="M0,75 Q20,80 45,72 T100,78" fill="none" stroke="#c9a227" stroke-width="0.3" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#pbg)"/>
  <rect width="600" height="600" fill="url(#marble)" opacity="0.3"/>
  <!-- QR Finder Patterns -->
  <g filter="url(#pGlow)">
    <rect x="30" y="30" width="130" height="130" rx="8" fill="none" stroke="#c9a227" stroke-width="7"/>
    <rect x="48" y="48" width="94" height="94" rx="5" fill="none" stroke="#ffd700" stroke-width="3.5"/>
    <rect x="66" y="66" width="58" height="58" rx="3" fill="url(#pg1)"/>
    <rect x="440" y="30" width="130" height="130" rx="8" fill="none" stroke="#c9a227" stroke-width="7"/>
    <rect x="458" y="48" width="94" height="94" rx="5" fill="none" stroke="#ffd700" stroke-width="3.5"/>
    <rect x="476" y="66" width="58" height="58" rx="3" fill="url(#pg1)"/>
    <rect x="30" y="440" width="130" height="130" rx="8" fill="none" stroke="#c9a227" stroke-width="7"/>
    <rect x="48" y="458" width="94" height="94" rx="5" fill="none" stroke="#ffd700" stroke-width="3.5"/>
    <rect x="66" y="476" width="58" height="58" rx="3" fill="url(#pg1)"/>
  </g>
  <!-- Art deco geometric grid - central mosaic -->
