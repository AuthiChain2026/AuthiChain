    <rect x="215" y="215" width="170" height="170" rx="3" fill="none" stroke="#ffd700" stroke-width="1" stroke-dasharray="8 4"/>
    <rect x="225" y="225" width="22" height="22" rx="2" fill="#ffd700" opacity="0.8"/>
    <rect x="255" y="225" width="22" height="22" rx="2" fill="#c9a227" opacity="0.6"/>
