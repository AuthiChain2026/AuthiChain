    <path d="M400,200 L420,180 L400,180Z" fill="#ffd700"/>
    <path d="M200,400 L180,420 L200,420Z" fill="#ffd700"/>
    <path d="M400,400 L420,420 L400,420Z" fill="#ffd700"/>
