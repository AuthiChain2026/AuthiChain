    <rect x="315" y="225" width="22" height="22" rx="2" fill="#c9a227" opacity="0.8"/>
    <rect x="345" y="225" width="22" height="22" rx="2" fill="#ffd700" opacity="0.6"/>
    <rect x="225" y="255" width="22" height="22" rx="2" fill="#c9a227" opacity="0.7"/>
