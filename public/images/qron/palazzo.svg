    <rect x="315" y="345" width="22" height="22" rx="2" fill="#c9a227" opacity="0.7"/>
    <rect x="345" y="345" width="22" height="22" rx="2" fill="#ffd700" opacity="0.8"/>
  </g>
  <!-- Gold leaf corners -->
