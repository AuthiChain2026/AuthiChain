    <radialGradient id="bgMarble" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#12121e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <pattern id="decoGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
