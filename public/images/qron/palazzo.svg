    <rect x="286" y="286" width="28" height="28" rx="3" fill="url(#pg1)" opacity="0.9"/>
    <rect x="225" y="315" width="22" height="22" rx="2" fill="#c9a227" opacity="0.8"/>
    <rect x="255" y="315" width="22" height="22" rx="2" fill="#ffd700" opacity="0.7"/>
    <rect x="315" y="315" width="22" height="22" rx="2" fill="#ffd700" opacity="0.8"/>
    <rect x="345" y="315" width="22" height="22" rx="2" fill="#c9a227" opacity="0.7"/>
