<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="n-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="n-soft">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="n-neon">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="n-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#120a18"/>
      <stop offset="100%" stop-color="#0a060d"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#n-bg)"/>
  <!-- Circuit grid background -->
  <g stroke="#a855f7" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="60" x2="600" y2="60"/><line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/><line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="0" y1="420" x2="600" y2="420"/><line x1="0" y1="480" x2="600" y2="480"/>
    <line x1="0" y1="540" x2="600" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="600"/><line x1="120" y1="0" x2="120" y2="600"/>
    <line x1="180" y1="0" x2="180" y2="600"/><line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="360" y1="0" x2="360" y2="600"/>
    <line x1="420" y1="0" x2="420" y2="600"/><line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="540" y1="0" x2="540" y2="600"/>
  </g>
  <!-- QR Finder - Top Left (neon purple) -->
  <g filter="url(#n-neon)">
    <rect x="30" y="30" width="120" height="120" rx="6" fill="none" stroke="#a855f7" stroke-width="8"/>
    <rect x="50" y="50" width="80" height="80" rx="4" fill="none" stroke="#06b6d4" stroke-width="6"/>
    <rect x="68" y="68" width="44" height="44" rx="3" fill="#ec4899"/>
  </g>
  <!-- QR Finder - Top Right (neon cyan) -->
  <g filter="url(#n-neon)">
    <rect x="450" y="30" width="120" height="120" rx="6" fill="none" stroke="#06b6d4" stroke-width="8"/>
    <rect x="470" y="50" width="80" height="80" rx="4" fill="none" stroke="#ec4899" stroke-width="6"/>
    <rect x="488" y="68" width="44" height="44" rx="3" fill="#a855f7"/>
