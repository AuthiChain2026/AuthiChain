<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="l-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="l-soft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="l-flame">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="l-bg" cx="50%" cy="60%" r="65%">
      <stop offset="0%" stop-color="#0c1020"/>
      <stop offset="100%" stop-color="#080a0d"/>
    </radialGradient>
    <linearGradient id="l-rocket" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#l-bg)"/>
  <!-- Stars background -->
  <g fill="white" opacity="0.15">
    <circle cx="50" cy="200" r="1"/><circle cx="120" cy="300" r="0.8"/>
    <circle cx="180" cy="170" r="1.2"/><circle cx="250" cy="160" r="0.7"/>
    <circle cx="350" cy="155" r="1"/><circle cx="420" cy="170" r="0.8"/>
    <circle cx="480" cy="190" r="1.1"/><circle cx="550" cy="210" r="0.9"/>
    <circle cx="530" cy="300" r="1"/><circle cx="560" cy="380" r="0.7"/>
    <circle cx="40" cy="400" r="0.9"/><circle cx="70" cy="500" r="1"/>
    <circle cx="160" cy="550" r="0.8"/><circle cx="440" cy="560" r="1.1"/>
    <circle cx="520" cy="520" r="0.7"/><circle cx="300" cy="550" r="0.9"/>
  </g>
  <!-- QR Finder - Top Left (orange) -->
  <g filter="url(#l-glow)">
    <rect x="30" y="30" width="120" height="120" rx="6" fill="none" stroke="#f97316" stroke-width="8"/>
    <rect x="50" y="50" width="80" height="80" rx="4" fill="none" stroke="#14b8a6" stroke-width="6"/>
    <rect x="68" y="68" width="44" height="44" rx="3" fill="#38bdf8"/>
  </g>
  <!-- QR Finder - Top Right -->
  <g filter="url(#l-glow)">
    <rect x="450" y="30" width="120" height="120" rx="6" fill="none" stroke="#f97316" stroke-width="8"/>
    <rect x="470" y="50" width="80" height="80" rx="4" fill="none" stroke="#38bdf8" stroke-width="6"/>
    <rect x="488" y="68" width="44" height="44" rx="3" fill="#14b8a6"/>
  </g>
  <!-- QR Finder - Bottom Left -->
  <g filter="url(#l-glow)">
    <rect x="30" y="450" width="120" height="120" rx="6" fill="none" stroke="#f97316" stroke-width="8"/>
    <rect x="50" y="470" width="80" height="80" rx="4" fill="none" stroke="#14b8a6" stroke-width="6"/>
    <rect x="68" y="488" width="44" height="44" rx="3" fill="#f97316"/>
  </g>
  <!-- Timing patterns -->
  <g fill="#14b8a6" opacity="0.6">
    <rect x="170" y="82" width="12" height="12" rx="2"/><rect x="198" y="82" width="12" height="12" rx="2"/>
    <rect x="226" y="82" width="12" height="12" rx="2"/><rect x="254" y="82" width="12" height="12" rx="2"/>
    <rect x="282" y="82" width="12" height="12" rx="2"/><rect x="310" y="82" width="12" height="12" rx="2"/>
    <rect x="338" y="82" width="12" height="12" rx="2"/><rect x="366" y="82" width="12" height="12" rx="2"/>
    <rect x="394" y="82" width="12" height="12" rx="2"/><rect x="422" y="82" width="12" height="12" rx="2"/>
    <rect x="82" y="170" width="12" height="12" rx="2"/><rect x="82" y="198" width="12" height="12" rx="2"/>
    <rect x="82" y="226" width="12" height="12" rx="2"/><rect x="82" y="254" width="12" height="12" rx="2"/>
    <rect x="82" y="282" width="12" height="12" rx="2"/><rect x="82" y="310" width="12" height="12" rx="2"/>
    <rect x="82" y="338" width="12" height="12" rx="2"/><rect x="82" y="366" width="12" height="12" rx="2"/>
    <rect x="82" y="394" width="12" height="12" rx="2"/><rect x="82" y="422" width="12" height="12" rx="2"/>
  </g>
  <!-- Central rocket shape made of triangular/upward modules -->
  <g filter="url(#l-soft)">
    <!-- Rocket nose cone - top triangular cluster -->
    <polygon points="300,185 293,200 307,200" fill="#38bdf8" opacity="0.95"/>
    <polygon points="300,195 290,215 310,215" fill="#14b8a6" opacity="0.9"/>
    <polygon points="300,210 286,230 314,230" fill="#38bdf8" opacity="0.9"/>
    <!-- Rocket body - rectangular modules -->
    <rect x="288" y="232" width="24" height="12" rx="2" fill="#14b8a6" opacity="0.9"/>
    <rect x="285" y="248" width="30" height="12" rx="2" fill="#38bdf8" opacity="0.9"/>
    <rect x="282" y="264" width="36" height="12" rx="2" fill="#14b8a6" opacity="0.85"/>
    <rect x="280" y="280" width="40" height="12" rx="2" fill="#38bdf8" opacity="0.9"/>
    <rect x="278" y="296" width="44" height="12" rx="2" fill="#14b8a6" opacity="0.85"/>
    <rect x="276" y="312" width="48" height="12" rx="2" fill="#38bdf8" opacity="0.9"/>
    <rect x="278" y="328" width="44" height="12" rx="2" fill="#14b8a6" opacity="0.85"/>
    <rect x="280" y="344" width="40" height="12" rx="2" fill="#38bdf8" opacity="0.9"/>
    <rect x="282" y="360" width="36" height="12" rx="2" fill="#14b8a6" opacity="0.85"/>
    <!-- Side fins -->
    <polygon points="276,330 258,360 276,360" fill="#f97316" opacity="0.85"/>
    <polygon points="324,330 342,360 324,360" fill="#f97316" opacity="0.85"/>
    <polygon points="260,340 245,370 275,370" fill="#f97316" opacity="0.7"/>
    <polygon points="340,340 355,370 325,370" fill="#f97316" opacity="0.7"/>
  </g>
  <!-- Exhaust flame modules -->
  <g filter="url(#l-flame)">
    <polygon points="290,375 280,400 300,395" fill="#f97316" opacity="0.95"/>
    <polygon points="310,375 320,400 300,395" fill="#f97316" opacity="0.95"/>
    <polygon points="295,395 282,420 308,415" fill="#f97316" opacity="0.8"/>
    <polygon points="305,395 318,420 292,415" fill="#f97316" opacity="0.8"/>
    <polygon points="300,415 288,440 312,440" fill="#f97316" opacity="0.6"/>
    <rect x="292" y="440" width="16" height="8" rx="2" fill="#f97316" opacity="0.4"/>
    <rect x="295" y="452" width="10" height="6" rx="2" fill="#f97316" opacity="0.25"/>
  </g>
  <!-- Scattered data modules around the rocket -->
  <g opacity="0.55">
    <rect x="200" y="210" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="215" y="240" width="10" height="10" rx="2" fill="#14b8a6"/>
    <rect x="195" y="270" width="10" height="10" rx="2" fill="#f97316"/>
    <rect x="220" y="300" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="205" y="335" width="10" height="10" rx="2" fill="#14b8a6"/>
    <rect x="225" y="365" width="10" height="10" rx="2" fill="#f97316"/>
    <rect x="210" y="395" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="380" y="210" width="10" height="10" rx="2" fill="#14b8a6"/>
    <rect x="365" y="245" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="385" y="275" width="10" height="10" rx="2" fill="#f97316"/>
    <rect x="360" y="305" width="10" height="10" rx="2" fill="#14b8a6"/>
    <rect x="378" y="340" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="362" y="370" width="10" height="10" rx="2" fill="#f97316"/>
    <rect x="385" y="400" width="10" height="10" rx="2" fill="#14b8a6"/>
    <!-- Far scatter -->
    <rect x="500" y="210" width="10" height="10" rx="2" fill="#f97316"/>
    <rect x="518" y="250" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="505" y="290" width="10" height="10" rx="2" fill="#14b8a6"/>
    <rect x="522" y="330" width="10" height="10" rx="2" fill="#f97316"/>
    <rect x="508" y="370" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="525" y="410" width="10" height="10" rx="2" fill="#14b8a6"/>
    <rect x="500" y="450" width="10" height="10" rx="2" fill="#f97316"/>
    <rect x="520" y="485" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="540" y="510" width="8" height="8" rx="2" fill="#14b8a6"/>
    <rect x="550" y="540" width="8" height="8" rx="2" fill="#f97316"/>
    <rect x="200" y="505" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="240" y="518" width="10" height="10" rx="2" fill="#14b8a6"/>
    <rect x="280" y="505" width="10" height="10" rx="2" fill="#f97316"/>
    <rect x="320" y="525" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="360" y="510" width="10" height="10" rx="2" fill="#14b8a6"/>
    <rect x="400" y="520" width="10" height="10" rx="2" fill="#f97316"/>
    <rect x="440" y="500" width="10" height="10" rx="2" fill="#38bdf8"/>
    <rect x="460" y="530" width="10" height="10" rx="2" fill="#14b8a6"/>
  </g>
  <!-- Alignment pattern -->
  <g filter="url(#l-glow)">
    <rect x="440" y="440" width="40" height="40" rx="3" fill="none" stroke="#f97316" stroke-width="4"/>
    <rect x="452" y="452" width="16" height="16" rx="2" fill="#38bdf8"/>
  </g>
</svg>
