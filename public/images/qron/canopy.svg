    <rect x="46" y="46" width="66" height="66" rx="3" fill="none" stroke="url(#emeraldGrad)" stroke-width="3"/>
    <rect x="58" y="58" width="42" height="42" rx="2" fill="url(#emeraldGrad)"/>
  </g>

