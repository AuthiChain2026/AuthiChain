    <rect x="64" y="164" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="64" y="188" width="12" height="12" rx="2" fill="#3b82f6"/>
    <rect x="64" y="212" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="64" y="236" width="12" height="12" rx="2" fill="#3b82f6"/>
    <rect x="64" y="260" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="64" y="284" width="12" height="12" rx="2" fill="#3b82f6"/>
