    <rect x="340" y="353" width="14" height="14" rx="2" fill="#7c3aed"/>
    <rect x="370" y="353" width="12" height="12" rx="2" fill="#3b82f6"/>

    <!-- Bottom cluster -->
    <rect x="260" y="380" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="290" y="380" width="14" height="14" rx="2" fill="#93c5fd"/>
    <rect x="320" y="380" width="12" height="12" rx="2" fill="#3b82f6"/>
