    <rect x="380" y="64" width="12" height="12" rx="2" fill="#3b82f6"/>
    <rect x="404" y="64" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="428" y="64" width="12" height="12" rx="2" fill="#3b82f6"/>
    <rect x="452" y="64" width="12" height="12" rx="2" fill="#7c3aed"/>
  </g>

  <!-- Timing patterns - vertical -->
