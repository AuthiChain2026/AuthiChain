<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="blueGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="electricGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="bgBlue" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#06060d"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgBlue)"/>

  <!-- Speed lines background -->
  <g opacity="0.04" stroke="#3b82f6" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="80"/>
    <line x1="0" y1="200" x2="600" y2="190"/>
    <line x1="0" y1="300" x2="600" y2="310"/>
    <line x1="0" y1="400" x2="600" y2="390"/>
    <line x1="0" y1="500" x2="600" y2="510"/>
  </g>
  <g opacity="0.03" stroke="#7c3aed" stroke-width="1">
    <line x1="100" y1="0" x2="80" y2="600"/>
    <line x1="200" y1="0" x2="210" y2="600"/>
    <line x1="300" y1="0" x2="290" y2="600"/>
    <line x1="400" y1="0" x2="410" y2="600"/>
    <line x1="500" y1="0" x2="490" y2="600"/>
  </g>

  <!-- QR Finder Pattern - Top Left -->
  <g filter="url(#blueGlow)">
    <rect x="30" y="30" width="98" height="98" rx="4" fill="none" stroke="url(#blueGrad)" stroke-width="6"/>
    <rect x="46" y="46" width="66" height="66" rx="3" fill="none" stroke="url(#blueGrad)" stroke-width="3"/>
    <rect x="58" y="58" width="42" height="42" rx="2" fill="url(#blueGrad)"/>
  </g>

  <!-- QR Finder Pattern - Top Right -->
  <g filter="url(#blueGlow)">
    <rect x="472" y="30" width="98" height="98" rx="4" fill="none" stroke="url(#purpleGrad)" stroke-width="6"/>
    <rect x="488" y="46" width="66" height="66" rx="3" fill="none" stroke="url(#purpleGrad)" stroke-width="3"/>
    <rect x="500" y="58" width="42" height="42" rx="2" fill="url(#purpleGrad)"/>
  </g>

  <!-- QR Finder Pattern - Bottom Left -->
  <g filter="url(#blueGlow)">
    <rect x="30" y="472" width="98" height="98" rx="4" fill="none" stroke="url(#blueGrad)" stroke-width="6"/>
    <rect x="46" y="488" width="66" height="66" rx="3" fill="none" stroke="url(#blueGrad)" stroke-width="3"/>
    <rect x="58" y="500" width="42" height="42" rx="2" fill="url(#blueGrad)"/>
