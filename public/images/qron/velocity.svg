    <rect x="164" y="64" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="188" y="64" width="12" height="12" rx="2" fill="#3b82f6"/>
    <rect x="212" y="64" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="236" y="64" width="12" height="12" rx="2" fill="#3b82f6"/>
