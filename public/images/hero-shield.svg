<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="40%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#a07d10"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1400" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0900" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="hexGrid" x="0" y="0" width="40" height="46" patternUnits="userSpaceOnUse">
      <polygon points="20,2 38,12 38,34 20,44 2,34 2,12" fill="none" stroke="#c9a227" stroke-width="0.4" stroke-opacity="0.15"/>
    </pattern>
    <clipPath id="shieldClip">
      <path d="M400,80 L560,130 L560,310 Q560,430 400,510 Q240,430 240,310 L240,130 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGlow)"/>
  <rect width="800" height="600" fill="url(#hexGrid)"/>

  <!-- Ambient shield glow -->
  <ellipse cx="400" cy="300" rx="220" ry="240" fill="url(#shieldGlow)"/>

  <!-- Outer orbit rings -->
  <ellipse cx="400" cy="300" rx="280" ry="260" fill="none" stroke="#c9a227" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="8 6"/>
  <ellipse cx="400" cy="300" rx="310" ry="290" fill="none" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.12" stroke-dasharray="4 8"/>

  <!-- Corner hexagons -->
  <polygon points="60,50 90,50 105,75 90,100 60,100 45,75" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="740,50 770,50 785,75 770,100 740,100 725,75" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="60,500 90,500 105,525 90,550 60,550 45,525" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="740,500 770,500 785,525 770,550 740,550 725,525" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Floating data nodes with dashed lines -->
  <line x1="100" y1="200" x2="240" y2="280" stroke="#c9a227" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="5 4"/>
  <circle cx="100" cy="200" r="8" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="100" cy="200" r="3" fill="#e8c547" fill-opacity="0.8"/>

  <line x1="700" y1="180" x2="560" y2="260" stroke="#c9a227" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="5 4"/>
  <circle cx="700" cy="180" r="8" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="700" cy="180" r="3" fill="#e8c547" fill-opacity="0.8"/>

  <line x1="130" y1="420" x2="240" y2="350" stroke="#c9a227" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="5 4"/>
  <circle cx="130" cy="420" r="6" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="130" cy="420" r="2.5" fill="#e8c547" fill-opacity="0.7"/>

  <line x1="670" y1="400" x2="560" y2="340" stroke="#c9a227" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="5 4"/>
  <circle cx="670" cy="400" r="6" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="670" cy="400" r="2.5" fill="#e8c547" fill-opacity="0.7"/>

  <!-- Shield body (filled) -->
  <path d="M400,80 L560,130 L560,310 Q560,430 400,510 Q240,430 240,310 L240,130 Z" fill="url(#shieldFill)" filter="url(#softGlow)"/>

  <!-- Shield border gradient -->
  <path d="M400,80 L560,130 L560,310 Q560,430 400,510 Q240,430 240,310 L240,130 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="3" filter="url(#goldGlow)"/>

  <!-- Inner shield detail lines -->
  <path d="M400,105 L538,148 L538,308 Q538,410 400,480 Q262,410 262,308 L262,148 Z" fill="none" stroke="#c9a227" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Shield inner hex pattern (clipped) -->
  <rect x="240" y="80" width="320" height="430" fill="url(#hexGrid)" clip-path="url(#shieldClip)" opacity="0.4"/>

  <!-- Chain link emblem center -->
  <!-- Link 1 -->
  <rect x="340" y="235" width="55" height="30" rx="15" fill="none" stroke="url(#chainGrad)" stroke-width="3.5" filter="url(#goldGlow)"/>
  <!-- Link 2 -->
  <rect x="405" y="255" width="55" height="30" rx="15" fill="none" stroke="url(#chainGrad)" stroke-width="3.5" filter="url(#goldGlow)"/>
  <!-- Link 3 -->
  <rect x="340" y="275" width="55" height="30" rx="15" fill="none" stroke="url(#chainGrad)" stroke-width="3.5" filter="url(#goldGlow)"/>
  <!-- Link 4 -->
  <rect x="405" y="295" width="55" height="30" rx="15" fill="none" stroke="url(#chainGrad)" stroke-width="3.5" filter="url(#goldGlow)"/>

  <!-- Center lock -->
  <rect x="378" y="310" width="44" height="36" rx="5" fill="#1a1400" stroke="url(#shieldGrad)" stroke-width="2.5"/>
  <path d="M386,310 L386,298 Q386,278 400,278 Q414,278 414,298 L414,310" fill="none" stroke="url(#shieldGrad)" stroke-width="2.5"/>
  <circle cx="400" cy="328" r="6" fill="url(#shieldGrad)"/>

  <!-- Crown topper -->
  <path d="M366,96 L380,112 L400,92 L420,112 L434,96" fill="none" stroke="url(#shieldGrad)" stroke-width="2.5" stroke-linejoin="round" filter="url(#goldGlow)"/>
  <circle cx="366" cy="96" r="3.5" fill="#ffd700"/>
  <circle cx="400" cy="92" r="3.5" fill="#ffd700"/>
  <circle cx="434" cy="96" r="3.5" fill="#ffd700"/>

  <!-- Label -->
  <text x="400" y="550" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="#c9a227" fill-opacity="0.8">AUTHICHAIN PROTOCOL</text>

  <!-- Side tick marks -->
  <line x1="240" y1="220" x2="252" y2="220" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="240" y1="300" x2="252" y2="300" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="240" y1="380" x2="252" y2="380" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="560" y1="220" x2="548" y2="220" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="560" y1="300" x2="548" y2="300" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="560" y1="380" x2="548" y2="380" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>
