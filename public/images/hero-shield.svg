<svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rg-bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a0838"/>
      <stop offset="100%" stop-color="#030108"/>
    </radialGradient>
    <linearGradient id="lg-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e0450"/>
    </linearGradient>
    <radialGradient id="rg-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.35)"/>
      <stop offset="100%" stop-color="rgba(124,58,237,0)"/>
    </radialGradient>
    <filter id="f-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="p-hex" x="0" y="0" width="56" height="48" patternUnits="userSpaceOnUse">
      <polygon points="28,2 54,16 54,44 28,58 2,44 2,16" fill="none" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
    </pattern>
    <clipPath id="cp-shield">
      <path d="M400 76 L528 146 L528 350 Q528 448 400 498 Q272 448 272 350 L272 146 Z"/>
    </clipPath>
  </defs>

  <rect width="800" height="600" fill="url(#rg-bg)"/>
