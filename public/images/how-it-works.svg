<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b00"/>
      <stop offset="100%" stop-color="#080700"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1600"/>
      <stop offset="100%" stop-color="#100d00"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#c9a227" fill-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>
  <rect width="900" height="300" fill="url(#dots)"/>

  <!-- Section title -->
  <text x="450" y="36" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#c9a227" fill-opacity="0.7">HOW IT WORKS</text>
  <line x1="180" y1="44" x2="720" y2="44" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- ─── STEP 1: Upload Product ─── -->
  <g transform="translate(60,60)">
    <!-- Card -->
    <rect x="0" y="0" width="210" height="200" rx="12" fill="url(#cardGrad)" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Number badge -->
    <circle cx="32" cy="32" r="18" fill="url(#goldGrad)" filter="url(#glow)"/>
    <text x="32" y="38" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="16" font-weight="800" fill="#0d0b00">1</text>
    <!-- Upload icon -->
    <rect x="75" y="55" width="60" height="50" rx="8" fill="#1a1400" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
    <path d="M105,75 L105,90 M98,82 L105,75 L112,82" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="90" y1="98" x2="120" y2="98" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- Text -->
    <text x="105" y="130" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#ffd700">Upload Product</text>
    <text x="105" y="150" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10.5" fill="#c9a227" fill-opacity="0.7">Scan or enter</text>
    <text x="105" y="165" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10.5" fill="#c9a227" fill-opacity="0.7">product details</text>
    <text x="105" y="180" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10.5" fill="#c9a227" fill-opacity="0.7">onto the chain</text>
  </g>

  <!-- Arrow 1 → 2 -->
  <g transform="translate(278,145)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="80,0 70,-5 70,5" fill="#ffd700"/>
    <!-- Top label -->
    <text x="40" y="-10" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="8.5" fill="#c9a227" fill-opacity="0.6" letter-spacing="1">SECURE</text>
  </g>

  <!-- ─── STEP 2: AI AutoFlow™ ─── -->
  <g transform="translate(365,60)">
    <!-- Card glow effect -->
    <rect x="-4" y="-4" width="218" height="208" rx="14" fill="#c9a227" fill-opacity="0.06"/>
    <!-- Card -->
    <rect x="0" y="0" width="210" height="200" rx="12" fill="url(#cardGrad)" stroke="#ffd700" stroke-width="2"/>
    <!-- Number badge -->
    <circle cx="32" cy="32" r="18" fill="url(#goldGrad)" filter="url(#glow)"/>
    <text x="32" y="38" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="16" font-weight="800" fill="#0d0b00">2</text>
    <!-- AI icon (circuit brain) -->
    <rect x="75" y="55" width="60" height="50" rx="8" fill="#1a1400" stroke="#ffd700" stroke-width="1.8"/>
    <circle cx="105" cy="80" r="12" fill="none" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="93" y1="80" x2="75" y2="80" stroke="#ffd700" stroke-width="1.2"/>
    <line x1="117" y1="80" x2="135" y2="80" stroke="#ffd700" stroke-width="1.2"/>
    <line x1="105" y1="68" x2="105" y2="57" stroke="#ffd700" stroke-width="1.2"/>
    <line x1="105" y1="92" x2="105" y2="103" stroke="#ffd700" stroke-width="1.2"/>
    <circle cx="105" cy="80" r="4" fill="#ffd700"/>
    <!-- Text -->
    <text x="105" y="130" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#ffd700">AI AutoFlow™</text>
    <text x="105" y="150" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10.5" fill="#c9a227" fill-opacity="0.7">Automated AI mints</text>
    <text x="105" y="165" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10.5" fill="#c9a227" fill-opacity="0.7">QRON identity token</text>
    <text x="105" y="180" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10.5" fill="#c9a227" fill-opacity="0.7">on-chain instantly</text>
    <!-- Active badge -->
    <rect x="62" y="198" width="86" height="16" rx="8" fill="#c9a227" fill-opacity="0.15" stroke="#c9a227" stroke-width="0.8"/>
    <text x="105" y="210" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="8" font-weight="600" letter-spacing="1" fill="#ffd700">HIGHLIGHTED</text>
  </g>

  <!-- Arrow 2 → 3 -->
  <g transform="translate(583,145)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="80,0 70,-5 70,5" fill="#ffd700"/>
    <text x="40" y="-10" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="8.5" fill="#c9a227" fill-opacity="0.6" letter-spacing="1">INSTANT</text>
  </g>

  <!-- ─── STEP 3: Verify Anywhere ─── -->
  <g transform="translate(670,60)">
    <!-- Card -->
    <rect x="0" y="0" width="210" height="200" rx="12" fill="url(#cardGrad)" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Number badge -->
    <circle cx="32" cy="32" r="18" fill="url(#goldGrad)" filter="url(#glow)"/>
    <text x="32" y="38" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="16" font-weight="800" fill="#0d0b00">3</text>
    <!-- Verify icon (checkmark shield) -->
    <rect x="75" y="55" width="60" height="50" rx="8" fill="#1a1400" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
    <path d="M105,62 L123,68 L123,82 Q123,93 105,98 Q87,93 87,82 L87,68 Z" fill="none" stroke="#c9a227" stroke-width="1.8"/>
    <path d="M96,80 L102,86 L114,74" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Text -->
    <text x="105" y="130" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#ffd700">Verify Anywhere</text>
    <text x="105" y="150" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10.5" fill="#c9a227" fill-opacity="0.7">Scan QRON code</text>
    <text x="105" y="165" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10.5" fill="#c9a227" fill-opacity="0.7">to verify product</text>
    <text x="105" y="180" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10.5" fill="#c9a227" fill-opacity="0.7">authenticity globally</text>
  </g>

  <!-- Bottom label row -->
  <text x="165" y="285" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" letter-spacing="1.5" fill="#c9a227" fill-opacity="0.45">PRODUCT OWNERS</text>
  <text x="470" y="285" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" letter-spacing="1.5" fill="#c9a227" fill-opacity="0.45">BLOCKCHAIN PROTOCOL</text>
  <text x="775" y="285" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" letter-spacing="1.5" fill="#c9a227" fill-opacity="0.45">CONSUMERS &amp; AUDITORS</text>
</svg>
