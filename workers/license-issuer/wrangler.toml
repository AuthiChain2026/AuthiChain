name = "authichain-license-issuer"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────────────────────────────────────
# FIRST-TIME SETUP
#   Run the provisioning script to replace placeholder IDs and apply migrations:
#     cd workers/license-issuer
#     bash scripts/provision.sh
#
# DEPLOY
#     wrangler deploy
# ──────────────────────────────────────────────────────────────────────────────

[[d1_databases]]
binding = "DATABASE"
database_name = "authichain-license-db"
database_id = "YOUR_D1_DATABASE_ID"  # replaced by scripts/provision.sh

[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_NAMESPACE_ID"           # replaced by scripts/provision.sh

# Secrets — set via: wrangler secret put <NAME>
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_AGENT_BROWSER_PRO_PRICE_ID
# STRIPE_AGENT_BROWSER_ENTERPRISE_PRICE_ID
# LICENSE_PRIVATE_KEY_PEM               (openssl ecparam -name prime256v1 ...)
# LICENSE_PUBLIC_KEY_PEM
# TELEGRAM_BOT_TOKEN
# TELEGRAM_ADMIN_CHAT_ID

[vars]
ENVIRONMENT = "production"
