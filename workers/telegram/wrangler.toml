name = "authichain-telegram"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DATABASE"
database_name = "authichain-telegram-db"
database_id = "3a330910-b81a-43e9-b3fb-bd8e529cff07"

[[kv_namespaces]]
binding = "SESSIONS"
id = "ef040f1eb8ca4d6f9f7fe4e908cdfd69"

# Secrets — set via: wrangler secret put <NAME>
# TELEGRAM_BOT_TOKEN
# TELEGRAM_WEBHOOK_SECRET
# TELEGRAM_ADMIN_CHAT_ID
# SITE_URL

[vars]
ENVIRONMENT = "production"
