name = "ae-edge-gateway"
main = "src/index.js"
# Ed25519 in WebCrypto requires compatibility_date >= 2024-02-01.
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put <NAME>`):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   AE_PUBKEY_<KEY_ID_UPPER>   one per issuer; see HEADERS.md
#
# Routes are intentionally unset — deploys to ae-edge-gateway.<account>.workers.dev.
# Add a [[routes]] block (or custom domain) when ready to front with a real hostname.

[build]
command = "npm install"

[env.production]
name = "ae-edge-gateway"

[env.staging]
name = "ae-edge-gateway-staging"
